spring.application.name=Quiz-Website
# Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/quiz_app_dev?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_local_password_here

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# jwt settings
app.jwt.secret=${JWT_SECRET:mySuperSecretLocalDevelopmentKeyThatIsMinimum256BitsLong!!}
app.jwt.expiration=86400000

# cors settings
app.cors.allowed-origin=${CORS_ORIGIN:http://localhost:5173}

# Tell Spring Boot to initialize the schema using your custom SQL script
spring.sql.init.mode=always
