<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quiz Results</title>
</head>
<body>

<h1>Quiz Results</h1>

<h2 th:text="${quiz.title}">Quiz Title</h2>
<p th:text="${quiz.description}">Quiz Description</p>

<h3>Your Score: <span th:text="${score}">0</span> / <span th:text="${total}">0</span></h3>
<p>Time taken: <span th:text="${timeTaken}">0</span> seconds</p>

<a href="/">Back to Home</a>

</body>
</html>
