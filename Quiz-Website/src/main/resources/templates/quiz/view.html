<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${quiz.title}">Quiz</title>
</head>
<body>

<h1 th:text="${quiz.title}">Quiz Title</h1>
<p th:text="${quiz.description}">Quiz Description</p>

<p>Created by: <span th:text="${quiz.creatorId}">Creator</span></p>
<p>Created at: <span th:text="${quiz.createdAt}">Date</span></p>

<h3>Quiz Settings</h3>
<ul>
    <li>Random order: <span th:text="${quiz.randomized} ? 'Yes' : 'No'">No</span></li>
    <li>Single page: <span th:text="${quiz.singlePage} ? 'Yes' : 'No'">Yes</span></li>
    <li>Immediate feedback: <span th:text="${quiz.immediateFeedback} ? 'Yes' : 'No'">No</span></li>
    <li>Practice mode available: <span th:text="${quiz.allowPractice} ? 'Yes' : 'No'">No</span></li>
</ul>

<a th:href="@{/quiz/{id}/take(id=${quiz.id})}">
    <button>Take Quiz</button>
</a>

<div th:if="${quiz.allowPractice}">
    <a th:href="@{/quiz/{id}/practice(id=${quiz.id})}">
        <button>Practice Mode</button>
    </a>
</div>

<a href="/">Back to Home</a>

</body>
</html>
